<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/png" href="https://home.techprogramming.org/wp-content/uploads/2025/02/favicon-32x32-1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 90%;
            text-align: center;
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #007bff;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: bold;
            color: #007bff;
            transition: background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .tab i {
            font-size: 24px;
        }

        .tab:hover {
            background-color: #f0f8ff;
        }

        .tab.active {
            border-bottom: 3px solid #007bff;
            background-color: #f0f8ff;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f1f1f1;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        footer {
            background-color: #E45415;
            color: white;
            padding: 10px 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    

    <div class="container">

        <p><b>नागरिक वडापत्र हेर्न PDF वा Image सिम्बोलमा थिच्नुहोस।</b></p>
        
        <div class="tabs">
            <div class="tab active" id="pdf-tab">
                <i class="fa fa-file-pdf fa-2x"></i>
                <span>Open PDF</span>
            </div>
            <div class="tab" id="image-tab">
                <i class="fa fa-image fa-2x"></i>
                <span>Open Image</span>
            </div>
            <div class="dropdown">
                <button class="tab">
                    <i class="fa fa-download fa-2x"></i>
                    <span>Download</span>
                </button>
                <div class="dropdown-content">
                    <a href="#" id="download-pdf">Download PDF</a>
                    <a href="#" id="download-image">Download Image</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Copyright © 2025 Nagarik Badapatra Nepal. All Rights Reserved.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const pdfTab = document.getElementById('pdf-tab');
            const imageTab = document.getElementById('image-tab');
            const downloadPdfBtn = document.getElementById('download-pdf');
            const downloadImageBtn = document.getElementById('download-image');

            // Define content URLs
            let pdfFileUrl = '';
            let imageFileUrl = '';

            // Fetch the file URLs dynamically (for now we can hardcode them or fetch from your page's data)
            {% for file in page.files.all %}
                {% with file.file.url|lower as file_url %}
                    {% if file_url|slice:"-4:" == ".pdf" %}
                        pdfFileUrl = "{{ file.file.url }}";
                    {% endif %}
                    {% if file_url|slice:"-4:" == ".jpg" or file_url|slice:"-4:" == ".png" or file_url|slice:"-5:" == ".jpeg" %}
                        imageFileUrl = "{{ file.file.url }}";
                    {% endif %}
                {% endwith %}
            {% endfor %}

            pdfTab.addEventListener('click', function () {
                pdfTab.classList.add('active');
                imageTab.classList.remove('active');
                window.open(pdfFileUrl, '_blank'); // Open PDF in new tab
            });

            imageTab.addEventListener('click', function () {
                imageTab.classList.add('active');
                pdfTab.classList.remove('active');
                window.open(imageFileUrl, '_blank'); // Open Image in new tab
            });

            downloadPdfBtn.addEventListener('click', function () {
                const link = document.createElement('a');
                link.href = pdfFileUrl;
                link.download = pdfFileUrl.split('/').pop();
                link.click();
            });

            downloadImageBtn.addEventListener('click', function () {
                const link = document.createElement('a');
                link.href = imageFileUrl;
                link.download = imageFileUrl.split('/').pop();
                link.click();
            });
        });
    </script>

</body>
</html>
