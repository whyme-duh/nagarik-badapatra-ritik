services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - deploy-net
    depends_on:
      - postgres-db
    volumes:
      - /var/www/media:/app/media

  postgres-db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=nagarik
    ports:
      - "5434:5432"
    networks:
      - deploy-net
    volumes:
      - postgres-db_data:/var/lib/postgresql/data

volumes:
  postgres-db_data:
  media_data:
  static_data:

networks:
  deploy-net:
    driver: bridge
